front:
  text: 靈寶淨明新修九老神印伏魔祕法序身九
  hash: sha256:a092d19749a599d6292a3df7ed6747446c8f8e3138ac7df273c43d38b1a79d55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0267_HFL_000-001a, image: hfl/0315/0315-144.png}
body:
  text: 翼真壇副演教師何守證撰三洞真經列聖所寶祕於上宫約以科禁自非天地一開其文不出有遇之者皆金名五字夙著仙譜之人也粵惟上清伏魔印章受鍊形神祕法乃九老帝君龍漢劫初親得元尊之旨下教學仙之士實為靈寶之樞要歷古以來成功證為列真者未易詳述昔髙明大使許君受法於道君諶姆大仙吏隱東𣈆攝邪誅怪標江呪水以拯生民之災病積功纍德而後舉全家於霄漢者逮諸弟子繼踵仙去雖嗣法者代不乏人然文字傳習之久例多謬誤無以取證炎宋中興歲在作噩六真降神於渝出示靈寶淨明祕法化民以忠孝廉慎之教乃命洞神仙卿為訓導學者師越二年秋八月髙明大使歘臨于遊帷故地即今之江西玉隆萬壽宫也於是肇建仙壇名曰翼真以延善知識凡經典疑難悉聽扣問時新學九老法弟子因以其書請益焉果蒙真慈發明道要説氣鏡神印二篇證諸闕誤繼委門入悉以符呪訣法𨤲正之書成以呈真鑒賜可又命何守證序具重修之意以久其傳守證自愧內質地行聞見隘塞有何補於宗教然誤蒙真師收録充靈壇下弟子今巳三年矣謹直序其事於篇首顧唯龍沙巳合五陵之內應地仙者八百人而師出於豫章此言載於方册今黃童白叟皆熟誦之信不誣也凡遊於真師之門得此法者冝精進焉時紹興辛亥嵗重陽日謹序靈寶淨明新修九老神印伏魔祕法洞神抄注奉真旨編修洞神節録奉真旨同修太元判令奉真旨校勘九老帝君神印總論丹陽子曰道本氣也合氣以為體散氣以為用大道氣之溟漠也生乎天地之先散乎有無之表字因氣而結文因氣而成形因氣而聚聲因氣而含道本氣也上士以氣合道故不暴其氣氣止於一一者真一神合於心心與神交神由氣合磁石吸鐵翡翠碎金者性也性一合道道果氣也夫以真精精者一也一者道也以真精故召正氣以合道故成大仙仙鍊精合氣以氣合道神景淨明不役外物陽燧向日火隨而生方諸感月水旋而至水火自然之氣也道合自然得隂陽之正適隂陽之中純朴不散精粹無雜所以日有光明月有輝耀人稟乎靜則性達得乎明則心通性達心通故交感於日月之宫道本圓虛圎者氣之體虛者氣之用得圓虛之道故謂之淨明淨明則適正得中合於有情至道非情求也而此言情誠實生情情起而道自生以道者氣也以心合氣心動而情遂生情本生於中也上士學道不執一物不廢一物謂道可以情求則非也有假以為用也道不在呼吸採取也呼吸採取外也而道在內也道在內故可因呼吸採取而知亦在外道彌滿太虛貫該總屬得道之意而知所謂情則神印者可易曉也上士以印為道道託印以行之爾印者如燧珠之艾炷耳伏魔神印别本此印印釋清九老帝君回尸起死治病伏魔紏察三界鬼神皈正法事章文章文三十五字於背正雕白字真楷書之右印用金銀玉石或雷震棗木堅硬之木皆可印式濶二寸四分以應二十四氣長二寸八分以應二十八宿厚一寸二分以應一十二辰以三元八節甲子庚申或丁甲納音水火之日齋其工匠面東造之印成請度師保奏呈泰玄都省自授度之夕於露天置案設印以香花淨水祭其神印達旦即收入勿令雞犬婦人見之如是三夜祭訖方可用行受持印章法每日清旦燒香掐日君訣視印祝曰嗣法某謹以信香告于天印神靈侍衛官將曰元始開圖必自乎震九氣帝君獲此神印赤書玉字天地安鎮隱音內名鬼神符信我佩印章攝行天命護身濟人伏魔皈正無往不通有感皆應即望東取太陽氣吹入印中放訣用印訣凡行救治先焚香據來人事意啓白上清九老帝君法中一切靈神乞賜救護次用印時左手握訣屈中指掐掌心是也右手持印存變為九老帝君身御上清冠服左右官將侍衛方用印即望東取太陽真氣吹於所印文字上若專給印救治即就印上再書印到速安四字又押字訖再取太陽真氣吹印上發訣想神將隨印前去也發印訣如驅邪伐祟依常式印其來狀令燒付本家司命土地行遣如辟除妖怪書事用印貼本處安鎮如肢體傷折者貼印於疼痛處時瘟瘧疾者貼於前後心瘡瘍癰疽者燒灰或塗或洗鬼忤惡夢者或佩或吞目疾者淨水浸印洗之各獲安愈也法印式右印不拘木植雕造訖隨前印奏呈了法師遇申發奏狀行移上下通用此印使印時掐天罡訣每日服錬法上元解穢黃庭真符右符朱書每日淸晨面東掐午念呪以淨水吞服一道解穢淨身招集生氣呪曰五帝大魔總領鬼兵金鉞前戮魔王束形猛馬四張保命生根急急如上清九老帝君律令勑每日服鍊法上元延生守一真符右符朱書每日午時面東掐子念呪以淨水吞服一道安神守一保命延生呪曰延夀益算度厄尊神回骸起死無量度人執籙把籍齊到帝前急急如上清九老帝君律令勑淨明氣鏡篇丹陽子曰氣者虛而善應也神之帥也身之主也天以氣故穹窿而髙髙故能下濟地以氣故磅礴而厚厚故能上行日月星辰以氣清而照臨江海山嶽以氣聚而融結人以氣則頭圓法天之氣也足方法地之氣也眼髮象於日月星辰也毛竅象於山嶽河海也一氣之運隂陽竒偶與天地流通天地所以能長久者以其運而流通而人多夭折何哉以能用與不能用而巳是故氣以運動潛伏有道謂之淨明淨明故盈成盈成則周遍而達於命之情此天地之妙理隂陽之交變升降之早晏生物之謂也而人之一身可以上稽於天下法於地取天地之正而參於身可以移精而變化出沒於死生故能神神而靈謂之內營內營則丹鼎成黃芽生慶雲興斯可嚧吸雲風而喋唾雷霆能役夏冬而使秋春變暘為雨以雨為霖而天地之正氣在我而不在人死者可以生生者可以死人道正邪氣干者逢吾之氣而安鬼道邪而凌於人者逢吾道之氣而攝善學道者得之而為氣鏡之訣曰運行補養必達其機逹其機者必明其説每日服氣法每日早晨面東焚香兩手掐日君訣叩齒九通存想九老帝君太陽上帝在日輪中日色紫赤九芒霞光暉映太空如日初出之狀即放訣收手心拜祝曰嗣法某甲焚香供養九老帝君太陽上帝以今清旦燒香齋心滌意朝禮日宫吞納正氣伏願太陽上帝降賜光輝爍茲冥滯生育正真蕩彼邪穢百神既寧萬魔自退耳聰目明心通性慧與道合真長生久視又扣齒三通想見太陽紫赤之光照面即鼻引而咽納之如下文服四氣共三十六口也初之氣呪曰中理五氣混合百神凡服初氣垂兩手掐應病訣念呪七遍放左手訣換掐喉訣又腰取氣一口咽之隨氣重掐訣又念呪七遍放右手訣換掐喉訣又腰取氣一口咽之隨氣重掐訣次舉兩手喉訣相交對口左手在上右手在下又念呪七遍張口取氣一口吹在訣上即放訣此是一遍如此為之三遍共服九口氣也二之氣呪曰無英公子白元尊神太一司命桃康合延凡服第二氣垂兩手掐北辰訣念呪取氣如服初氣法同只更訣目亦三遍為之共服九口氣也三之氣呪曰束送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆凡服第三氣垂兩手掐紫庭訣念呪取氣如服初氣法同只更訣目亦三遍為之共服九口氣也四之氣呪曰魔無干犯鬼無妖精三官北酆明檢鬼營凡服第四氣垂兩手掐日君訣念呪取氣如服初氣法同只更訣目亦三遍為之共服九口氣也訣目掌圖靈寶淨明新修九老神印伏魔祕法終
