front:
  text: 靈寳淨明新修九老神印伏魔秘法序身九
  hash: sha256:7b329e999421f7a0ab9418b861680e86365003e1fbe72472bbb9b3db1913efb8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0267_SJB_000-100547a, image: sjb/10/100547a.png}
body:
  text: 翼眞壇副演教師何守證撰三洞眞經列聖所寳秘於上宫約以科禁自非天地一開其文不出有遇之者皆金名五字夙著仙譜之人也粤惟上清伏魔印章受鍊形神秘法乃九老帝君龍漢刼初親得元尊之旨下教學仙之士實爲靈寳之樞要歷古以來成功證爲列眞者未易詳述昔髙明大使許君受法於道君諶姆大仙吏隱東𣈆攝邪誅恠標江呪水以拯生民之災病積功累徳而後舉全家於霄漢者逮諸弟子繼踵仙去雖嗣法者代不乏人然文字傳習之乆例多謬誤無以取證炎宋中興歳在作噩六眞降神於渝出示靈寳淨明秘法化民以忠孝廉慎之教乃命洞神仙卿爲訓導學者師越二年秋八月髙明大使歘臨于遊帷故地即今之江西玉隆萬壽宫也於是肇建仙壇名曰翼眞以延善知識凡經典疑難悉聽扣問時新學九老法弟子因以其書請益焉果蒙眞慈發明道要說氣鏡神印二篇證諸闕誤繼委門入悉以符呪訣法𨤲正之書成以呈眞鍳賜可又命何守證序具重修之意以乆其傳守證自愧内質地行聞見隘塞有何補於宗教然誤蒙眞師收録充靈壇下弟子今巳三年矣謹直序其事於篇首顧唯龍沙巳合五陵之内應地仙者八百人而師出於豫章此言載於方冊今黃童白叟皆熟誦之信不誣也凡游於眞師之門得此法者冝精進焉時紹興辛亥嵗重陽日謹序靈寳淨明新修九老神印伏魔秘法洞神抄注奉眞旨編修洞神節録奉眞旨同修太元判令奉眞旨校勘九老帝君神印緫論丹陽子曰道本炁也合炁以爲體散炁以爲用大道炁之溟漠也生乎天地之先散乎有无之表字因炁而結文因炁而成形因炁而聚聲因炁而含道本炁也上士以炁合道故不暴其炁炁止於一一者眞一神合於心心與神交神由炁合磁石吸鐵翡翠碎金者性也性一合道道果炁也夫以眞精精者一也一者道也以眞精故召正炁以合道故成大仙仙鍊精合炁以炁合道神景淨明不役外物陽燧向日火隨而生方諸感月水旋而至水火自然之炁也道合自然得隂陽之正適隂陽之中純朴不散精粹无雜所以日有光明月有輝耀人禀乎靜則性達得乎明則心通性達心通故交感於日月之宫道本圓虚圎者氣之體虚者氣之用得圓虚之道故謂之淨明淨明則適正得中合於有情至道非情求也而此言情誠實生情情起而道自生以道者炁也以心合炁心動而情遂生情本生於中也上士學道不執一物不廢一物謂道可以情求則非也有假以爲用也道不在呼吸採取也呼吸採取外也而道在内也道在内故可因呼吸採取而知亦在外道彌滿太虚貫該緫屬得道之意而知所謂情則神印者可易曉也上士以印爲道道託印以行之爾印者如燧珠之艾炷耳伏魔神印别本此印印釋清九老帝君廻屍起死治病伏魔紏察三界鬼神皈正法事章文章文三十五字於背正雕白字眞楷書之右印用金銀玉石或雷震棗木堅硬之木皆可印式濶二寸四分以應二十四炁長二寸八分以應二十八宿厚一寸二分以應一十二辰以三元八節甲子庚申或丁甲納音水火之日齋其工匠面東造之印成請度師保奏呈泰玄都省自授度之夕於露天置案設印以香花淨水祭其神印達旦即收入勿令雞犬婦人見之如是三夜祭訖方可用行受持印章法每日清旦燒香掐日君訣視印祝曰嗣法某謹以信香告于天印神靈侍衛官將曰元始開圖必自乎震九炁帝君獲此神印赤書玉字天地安鎮隱音内名鬼神符信我佩印章攝行天命護身濟人伏魔皈正无往不通有感皆應即望東取太陽炁吹入印中放訣用印訣凡行救治先焚香據來人事意啓白上清九老帝君法中一切靈神乞賜救護次用印時左手握訣屈中指掐掌心是也右手持印存變爲九老帝君身御上清冠服左右官將侍衞方用印即望東取太陽眞炁吹於所印文字上若專給印救治即就印上再書印到速安四字又押字訖再取太陽眞炁吹印上發訣想神將隨印前去也發印訣如驅邪伐祟依常式印其來狀令燒付本家司命土地行遣如辟除妖恠書事用印貼本處安鎮如肢體傷折者貼印於疼痛處時瘟瘧疾者貼於前後心瘡瘍㿈疽者燒灰或塗或洗鬼忤惡夢者或佩或吞目疾者淨水浸印洗之各獲安愈也法印式右印不拘木植雕造訖隨前印奏呈了法師遇申發奏狀行移上下通用此印使印時掐天罡訣每日服錬法上元解穢黄庭眞符右符朱書每日淸晨面東掐午念呪以淨水吞服一道解穢淨身招集生炁呪曰五帝大魔緫領鬼兵金鉞前戮魔王束形猛馬四張保命生根急急如上清九老帝君律令勑每日服鍊法上元延生守一眞符右符朱書毎日午時面東掐子念呪以淨水吞服一道安神守一保命延生呪曰延夀益筭度厄尊神廻骸起死无量度人執籙把籍齊到帝前急急如上清九老帝君律令勑淨明氣鏡篇丹陽子曰炁者虚而善應也神之帥也身之主也天以炁故穹窿而髙髙故能下濟地以炁故磅礴而厚厚故能上行日月星辰以炁清而照臨江海山岳以炁聚而融結人以炁則頭圓法天之炁也足方法地之炁也眼髮象於日月星辰也毛竅象於山岳河海也一炁之運隂陽竒偶與天地流通天地所以能長乆者以其運而流通而人多夭折何哉以能用與不能用而巳是故炁以運動潜伏有道謂之淨明淨明故盈成盈成則周徧而達於命之情此天地之妙理隂陽之交變升降之早晏生物之謂也而人之一身可以上稽於天下法於地取天地之正而參於身可以移精而變化出没於死生故能神神而靈謂之内營内營則丹鼎成黃芽生慶雲興斯可嚧吸雲風而啑唾雷霆能役夏冬而使秋春變暘爲雨以雨爲霖而天地之正炁在我而不在人死者可以生生者可以死人道正邪炁干者逢吾之炁而安鬼道邪而凌於人者逢吾道之炁而攝善學道者得之而爲炁鏡之訣曰運行補養必達其機逹其機者必明其說每日服氣法每日早晨面東焚香兩手掐日君訣叩齒九通存想九老帝君太陽上帝在日輪中日色紫赤九芒霞光暉映太空如日初出之狀即放訣收手心拜祝曰嗣法某甲焚香供養九老帝君太陽上帝以今清旦燒香齋心滌意朝禮日宫吞納正炁伏願太陽上帝降賜光輝爍茲冥滯生育正眞蕩彼邪穢百神旣寧萬魔自退耳聦目明心通性慧與道合眞長生乆視又扣齒三通想見太陽紫赤之光照面即鼻引而咽納之如下文服四炁共三十六口也初之炁呪曰中理五炁混合百神凡服初炁垂兩手掐應病訣念呪七徧放左手訣換掐喉訣又腰取炁一口咽之隨炁重掐訣又念呪七徧放右手訣換掐喉訣又腰取炁一口咽之隨炁重掐訣次舉兩手喉訣相交對口左手在上右手在下又念呪七徧張口取炁一口吹在訣上即放訣此是一徧如此爲之三徧共服九口炁也二之炁呪曰无英公子白元尊神太一司命桃康合延凡服第二炁垂兩手掐北辰訣念呪取炁如服初炁法同只更訣目亦三徧爲之共服九口炁也三之炁呪曰束送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆凡服第三炁垂兩手掐紫庭訣念呪取炁如服初炁法同只更訣目亦三徧爲之共服九口炁也四之炁呪曰魔無干犯鬼無妖精三官北酆明檢鬼營凡服第四炁垂兩手掐日君訣念呪取炁如服初炁法同只更訣目亦三徧爲之共服九口炁也訣目掌圖靈寳淨明新修九老神印伏魔秘法終
